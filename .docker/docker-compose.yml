services:
  web:
    build:
      context: ..
      dockerfile: .docker/web/Dockerfile
    restart: unless-stopped
    profiles: ["prod", "dev"]
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: .docker/api/Dockerfile
    restart: unless-stopped
    profiles: ["prod", "dev"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["prod", "dev"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  caddy_data:
